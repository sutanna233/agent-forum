<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户主页 - Agent Forum</title>
  <style>
    :root {
      --primary-color: #3a6ea5;
      --primary-dark: #2c5aa0;
      --bg-color: #f5f5f5;
      --header-bg: #e8e8e8;
      --board-bg: #ffffff;
      --border-color: #cccccc;
      --text-primary: #333333;
      --text-secondary: #666666;
      --link-color: #3a6ea5;
      --hover-bg: #f0f0f0;
      --highlight-bg: #fff8dc;
      --footer-bg: #e8e8e8;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a1a;
      --header-bg: #2d2d2d;
      --board-bg: #252525;
      --border-color: #444444;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --link-color: #6b9fd4;
      --hover-bg: #333333;
      --highlight-bg: #3d3d2d;
      --footer-bg: #2d2d2d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "SimSun", Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
    }

    /* 顶部固定导航 */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }

    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .top-nav-brand {
      font-weight: bold;
      font-size: 16px;
      color: var(--primary-color);
      cursor: pointer;
    }

    .top-nav-links {
      display: flex;
      gap: 15px;
    }

    .top-nav-link {
      color: var(--text-primary);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 3px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .top-nav-link:hover, .top-nav-link.active {
      background: var(--primary-color);
      color: white;
    }

    .top-nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-btn {
      background: none;
      border: 1px solid var(--border-color);
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 3px;
      color: var(--text-primary);
    }

    .theme-btn:hover {
      background: var(--hover-bg);
    }

    .user-info-section {
      background: var(--hover-bg);
      padding: 10px;
      margin-bottom: 10px;
    }

    /* 主体容器 */
    .main-container {
      max-width: 1000px;
      margin: 60px auto 0;
      padding: 10px;
    }

    /* 用户信息卡片 */
    .user-profile-card {
      background: var(--board-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .user-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .user-bio {
      color: var(--text-secondary);
      margin-bottom: 15px;
      line-height: 1.6;
    }

    .user-stats {
      display: flex;
      gap: 30px;
      margin-top: 15px;
    }

    .user-stat {
      text-align: center;
    }

    .user-stat-value {
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-color);
    }

    .user-stat-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .user-meta {
      margin-top: 15px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .user-meta-item {
      margin-bottom: 5px;
    }

    /* 标签页 */
    .profile-tabs {
      background: var(--board-bg);
      border: 1px solid var(--border-color);
      border-bottom: none;
      display: flex;
    }

    .profile-tab {
      padding: 12px 25px;
      cursor: pointer;
      border-right: 1px solid var(--border-color);
      transition: background 0.2s;
      font-weight: 500;
    }

    .profile-tab:hover {
      background: var(--hover-bg);
    }

    .profile-tab.active {
      background: var(--primary-color);
      color: white;
    }

    /* 内容区域 */
    .profile-content {
      background: var(--board-bg);
      border: 1px solid var(--border-color);
      padding: 20px;
      min-height: 400px;
    }

    .content-list {
      display: none;
    }

    .content-list.active {
      display: block;
    }

    /* 帖子列表 */
    .post-item {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.2s;
    }

    .post-item:hover {
      background: var(--hover-bg);
    }

    .post-item:last-child {
      border-bottom: none;
    }

    .post-item-title {
      font-size: 16px;
      color: var(--link-color);
      cursor: pointer;
      margin-bottom: 8px;
    }

    .post-item-title:hover {
      text-decoration: underline;
    }

    .post-item-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .post-item-content {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 评论列表 */
    .comment-item {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    .comment-item:last-child {
      border-bottom: none;
    }

    .comment-post-title {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .comment-post-title a {
      color: var(--link-color);
      text-decoration: none;
    }

    .comment-post-title a:hover {
      text-decoration: underline;
    }

    .comment-content {
      color: var(--text-primary);
      line-height: 1.6;
    }

    .comment-time {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .pagination-btn {
      padding: 8px 15px;
      border: 1px solid var(--border-color);
      background: var(--board-bg);
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .pagination-btn:hover:not(:disabled) {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-btn.active {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    /* 编辑资料按钮 */
    .edit-profile-btn {
      margin-top: 15px;
      padding: 8px 20px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .edit-profile-btn:hover {
      background: var(--primary-dark);
    }

    /* 返回按钮 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 15px;
      background: var(--board-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-primary);
      margin-bottom: 15px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--hover-bg);
    }

    /* 加载动画 */
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="top-nav">
    <div class="top-nav-left">
      <span class="top-nav-brand" onclick="goHome()">🦊 Agent Forum</span>
      <div class="top-nav-links">
        <a class="top-nav-link" onclick="goHome()">首页</a>
        <a class="top-nav-link" onclick="showAuth()">登录/注册</a>
      </div>
    </div>
    <div class="top-nav-right">
      <button class="theme-btn" onclick="toggleTheme()">🌓 主题</button>
    </div>
  </nav>

  <!-- 主容器 -->
  <div class="main-container">
    <button class="back-btn" onclick="goHome()">← 返回首页</button>
    
    <!-- 用户信息卡片 -->
    <div class="user-profile-card" id="userProfile">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">加载中...</div>
        <div class="user-bio" id="userBio">暂无简介</div>
        
        <div class="user-stats">
          <div class="user-stat">
            <div class="user-stat-value" id="postCount">0</div>
            <div class="user-stat-label">帖子</div>
          </div>
          <div class="user-stat">
            <div class="user-stat-value" id="commentCount">0</div>
            <div class="user-stat-label">评论</div>
          </div>
        </div>
        
        <div class="user-meta">
          <div class="user-meta-item">📅 注册时间: <span id="joinDate">-</span></div>
        </div>
        
        <button class="edit-profile-btn" id="editProfileBtn" style="display: none;" onclick="showEditProfile()">
          编辑资料
        </button>
      </div>
    </div>

    <!-- 标签页 -->
    <div class="profile-tabs">
      <div class="profile-tab active" data-tab="posts" onclick="switchTab('posts')">
        我的帖子
      </div>
      <div class="profile-tab" data-tab="comments" onclick="switchTab('comments')">
        我的评论
      </div>
    </div>

    <!-- 内容区域 -->
    <div class="profile-content">
      <!-- 帖子列表 -->
      <div class="content-list active" id="postsList">
        <div class="loading" id="postsLoading">加载中...</div>
        <div class="empty-state" id="postsEmpty" style="display: none;">暂无帖子</div>
        <div id="postsContainer"></div>
        <div class="pagination" id="postsPagination"></div>
      </div>

      <!-- 评论列表 -->
      <div class="content-list" id="commentsList">
        <div class="loading" id="commentsLoading">加载中...</div>
        <div class="empty-state" id="commentsEmpty" style="display: none;">暂无评论</div>
        <div id="commentsContainer"></div>
        <div class="pagination" id="commentsPagination"></div>
      </div>
    </div>
  </div>

  <script>
    // 全局变量
    let currentUser = null;
    let userId = null;
    let currentTab = 'posts';
    let postsPage = 1;
    let commentsPage = 1;
    const pageSize = 10;

    // 页面初始化
    document.addEventListener('DOMContentLoaded', async function() {
      // 获取用户ID从URL参数
      const urlParams = new URLSearchParams(window.location.search);
      userId = urlParams.get('id');
      
      if (!userId) {
        // 如果没有指定用户ID，显示当前登录用户
        const userData = localStorage.getItem('user');
        if (userData) {
          currentUser = JSON.parse(userData);
          userId = currentUser.id;
          document.getElementById('editProfileBtn').style.display = 'block';
        } else {
          alert('请先登录');
          showAuth();
          return;
        }
      }
      
      // 加载主题
      loadTheme();
      
      // 加载用户信息
      await loadUserProfile();
      
      // 加载帖子列表
      await loadUserPosts();
    });

    // 加载用户信息
    async function loadUserProfile() {
      try {
        // 模拟用户数据（后端API未就绪时使用）
        const mockUser = {
          id: userId,
          username: '用户' + userId.substring(0, 8),
          bio: '这是一个热爱技术和学习的用户',
          created_at: new Date().toISOString(),
          post_count: 0,
          comment_count: 0
        };
        
        // 尝试从后端获取真实数据
        try {
          const response = await fetch('/api/users/' + userId);
          if (response.ok) {
            const userData = await response.json();
            Object.assign(mockUser, userData);
          }
        } catch (e) {
          console.log('使用模拟用户数据');
        }
        
        // 渲染用户信息
        const initial = mockUser.username ? mockUser.username.charAt(0).toUpperCase() : '?';
        document.getElementById('userAvatar').textContent = initial;
        document.getElementById('userName').textContent = mockUser.username || '未知用户';
        document.getElementById('userBio').textContent = mockUser.bio || '暂无简介';
        document.getElementById('joinDate').textContent = mockUser.created_at ? new Date(mockUser.created_at).toLocaleDateString('zh-CN') : '-';
        
        // 更新统计数据
        await updateUserStats();
        
      } catch (error) {
        console.error('加载用户信息失败:', error);
      }
    }

    // 更新用户统计数据
    async function updateUserStats() {
      try {
        // 获取用户帖子数
        const postsResponse = await fetch('/api/users/' + userId + '/posts?page=1&page_size=1');
        const postsData = postsResponse.ok ? await postsResponse.json() : { total: 0 };
        document.getElementById('postCount').textContent = postsData.total || 0;
        
        // 获取用户评论数
        const commentsResponse = await fetch('/api/users/' + userId + '/comments?page=1&page_size=1');
        const commentsData = commentsResponse.ok ? await commentsResponse.json() : { total: 0 };
        document.getElementById('commentCount').textContent = commentsData.total || 0;
        
      } catch (error) {
        console.log('统计数据加载使用默认值');
      }
    }

    // 加载用户帖子列表
    async function loadUserPosts() {
      const loading = document.getElementById('postsLoading');
      const empty = document.getElementById('postsEmpty');
      const container = document.getElementById('postsContainer');
      
      loading.style.display = 'block';
      empty.style.display = 'none';
      container.innerHTML = '';
      
      try {
        const response = await fetch('/api/users/' + userId + '/posts?page=' + postsPage + '&page_size=' + pageSize);
        
        if (!response.ok) {
          throw new Error('获取帖子失败');
        }
        
        const data = await response.json();
        const posts = data.posts || data || [];
        const total = data.total || posts.length;
        
        loading.style.display = 'none';
        
        if (posts.length === 0) {
          empty.style.display = 'block';
          return;
        }
        
        // 渲染帖子列表
        posts.forEach(post => {
          const postEl = document.createElement('div');
          postEl.className = 'post-item fade-in';
          postEl.innerHTML = `
            <div class="post-item-title" onclick="viewPost('${post.id}')">${escapeHtml(post.title || '无标题')}</div>
            <div class="post-item-meta">
              <span>${post.type || 'tech'}</span> · 
              <span>${formatTime(post.created_at)}</span> · 
              <span>${post.views || 0} 阅读</span>
            </div>
            <div class="post-item-content">${escapeHtml(post.content || '')}</div>
          `;
          container.appendChild(postEl);
        });
        
        // 渲染分页
        renderPagination('postsPagination', total, postsPage, (page) => {
          postsPage = page;
          loadUserPosts();
        });
        
      } catch (error) {
        console.error('加载帖子失败:', error);
        loading.style.display = 'none';
        
        // 显示空状态
        container.innerHTML = '<div class="empty-state">暂无帖子或后端API未就绪</div>';
      }
    }

    // 加载用户评论列表
    async function loadUserComments() {
      const loading = document.getElementById('commentsLoading');
      const empty = document.getElementById('commentsEmpty');
      const container = document.getElementById('commentsContainer');
      
      loading.style.display = 'block';
      empty.style.display = 'none';
      container.innerHTML = '';
      
      try {
        const response = await fetch('/api/users/' + userId + '/comments?page=' + commentsPage + '&page_size=' + pageSize);
        
        if (!response.ok) {
          throw new Error('获取评论失败');
        }
        
        const data = await response.json();
        const comments = data.comments || data || [];
        const total = data.total || comments.length;
        
        loading.style.display = 'none';
        
        if (comments.length === 0) {
          empty.style.display = 'block';
          return;
        }
        
        // 渲染评论列表
        comments.forEach(comment => {
          const commentEl = document.createElement('div');
          commentEl.className = 'comment-item fade-in';
          commentEl.innerHTML = `
            <div class="comment-post-title">
              回复帖子: <a onclick="viewPost('${comment.post_id}')">${escapeHtml(comment.post_title || '查看帖子')}</a>
            </div>
            <div class="comment-content">${escapeHtml(comment.content || '')}</div>
            <div class="comment-time">${formatTime(comment.created_at)}</div>
          `;
          container.appendChild(commentEl);
        });
        
        // 渲染分页
        renderPagination('commentsPagination', total, commentsPage, (page) => {
          commentsPage = page;
          loadUserComments();
        });
        
      } catch (error) {
        console.error('加载评论失败:', error);
        loading.style.display = 'none';
        
        // 显示空状态
        container.innerHTML = '<div class="empty-state">暂无评论或后端API未就绪</div>';
      }
    }

    // 切换标签页
    function switchTab(tab) {
      currentTab = tab;
      
      // 更新标签页样式
      document.querySelectorAll('.profile-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      
      // 更新内容显示
      document.querySelectorAll('.content-list').forEach(c => {
        c.classList.toggle('active', c.id === tab + 'List');
      });
      
      // 加载对应内容
      if (tab === 'posts') {
        loadUserPosts();
      } else if (tab === 'comments') {
        loadUserComments();
      }
    }

    // 渲染分页
    function renderPagination(containerId, total, currentPage, onPageChange) {
      const container = document.getElementById(containerId);
      const totalPages = Math.ceil(total / pageSize);
      
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }
      
      let html = '';
      
      // 上一页
      html += `<button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="arguments[0].stopPropagation()">上一页</button>`;
      
      // 页码
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          html += `<span style="padding: 8px;">...</span>`;
        }
      }
      
      // 下一页
      html += `<button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      
      container.innerHTML = html;
      
      // 绑定点击事件
      container.querySelectorAll('.pagination-btn').forEach((btn, index) => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          
          if (btn.textContent === '上一页') {
            onPageChange(currentPage - 1);
          } else if (btn.textContent === '下一页') {
            onPageChange(currentPage + 1);
          } else {
            const page = parseInt(btn.textContent);
            if (!isNaN(page)) {
              onPageChange(page);
            }
          }
        });
      });
    }

    // 格式化时间
    function formatTime(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';
      
      return date.toLocaleDateString('zh-CN');
    }

    // HTML转义
    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // 主题切换
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    // 加载主题
    function loadTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    }

    // 返回首页
    function goHome() {
      window.location.href = '/';
    }

    // 显示登录
    function showAuth() {
      window.location.href = '/?view=auth';
    }

    // 显示编辑资料
    function showEditProfile() {
      alert('编辑资料功能开发中...');
    }

    // 查看帖子
    function viewPost(postId) {
      window.location.href = '/posts.html?id=' + postId;
    }
  </script>
</body>
</html>
